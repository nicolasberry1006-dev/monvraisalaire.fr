<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon vrai salaire</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>💰 Combien te reste-t-il vraiment ?</h1>
  <p class="subtitle">Après charges, impôts et dépenses</p>

  <input type="number" id="brut" value="3500" placeholder="Salaire brut">

  <select id="statut">
    <option value="0.22">Salarié</option>
    <option value="0.25">Cadre</option>
    <option value="0.22">Micro-entrepreneur</option>
    <option value="0.45">Société</option>
  </select>

  <div class="input-group">
    <span>🏛️</span>
    <input type="number" id="impot" value="10" placeholder="Impôt (%)">
  </div>

  <button onclick="calc()">Calculer</button>

  <div class="card">
    <h2>Résultat</h2>

    <p>💵 Net estimé : <b id="net">-</b></p>
    <p>💸 Après impôt : <b id="netImpot">-</b></p>

    <p id="reste" class="reste">-</p>

    <div class="bar-container">
      <div id="barDepenses" class="bar red"></div>
      <div id="barReste" class="bar green"></div>
    </div>

    <p class="legend">🔴 Dépenses | 🟢 Reste</p>

    <div id="analyse"></div>

    <button onclick="partager()">📲 Partager mon résultat</button>
  </div>

  <button class="toggle" onclick="toggleDepenses()">➕ Ajouter mes dépenses</button>

  <div id="depensesBloc" class="hidden">

    <h3>📉 Dépenses</h3>

    <div class="input-group"><span>🏠</span><input type="number" id="loyer" value="900"></div>
    <div class="input-group"><span>🛒</span><input type="number" id="courses" value="400"></div>
    <div class="input-group"><span>🚗</span><input type="number" id="transport" value="200"></div>
    <div class="input-group"><span>💡</span><input type="number" id="factures" value="100"></div>
    <div class="input-group"><span>🎮</span><input type="number" id="loisirs" value="200"></div>
    <div class="input-group"><span>🧾</span><input type="number" id="autres" value="100"></div>

  </div>

  <p class="disclaimer">⚠️ Estimation basée sur des moyennes</p>

</div>

</div>

<script src="script.js"></script>
<script defer src="/_vercel/insights/script.js"></script>

</body>
</html>
