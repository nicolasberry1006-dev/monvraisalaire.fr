<!DOCTYPE html> 
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combien te reste-t-il vraiment ?</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>💰 Combien te reste-t-il vraiment ?</h1>
  <p class="subtitle">Après charges, impôts et dépenses</p>

  <!-- INPUTS -->
  <input type="number" id="brut" placeholder="Salaire brut">

  <select id="statut">
    <option value="0.22">Salarié</option>
    <option value="0.25">Cadre</option>
    <option value="0.22">Micro-entrepreneur</option>
    <option value="0.45">Société</option>
  </select>

  <div class="input-group">
    <span>🏛️</span>
    <input type="number" id="impot" placeholder="Taux d’imposition (%)">
  </div>

  <button onclick="calc()">Calculer</button>

  <!-- RESULT -->
  <div class="card">

    <h2>Résultat</h2>

    <!-- 💰 RESTE (FOCUS PRINCIPAL) -->
    <p class="reste-title">💰 Il te reste</p>
    <h1 id="resteAffiche">0€</h1>

    <!-- 🔴🟢 DOUBLE JAUGE -->
    <div class="bar-container">
      <div id="barDepenses"></div>
      <div id="barReste"></div>
    </div>

    <p class="legend">🔴 Dépenses | 🟢 Reste</p>

    <!-- ANALYSE -->
    <div id="analyse"></div>

    <!-- 🏆 COMPARAISON PREMIUM -->
    <div id="comparaison" class="comparaison"></div>

    <!-- 💡 BOUTON ÉPARGNE -->
    <button onclick="toggleEpargne()" class="btn-epargne">
      💡 Optimiser mon argent
    </button>

    <!-- 💸 BLOC ÉPARGNE -->
  <div id="blocEpargne" class="hidden">

  <!-- 🔥 ÉPARGNE AUTO (PRIORITÉ) -->
  <div class="epargne-box">
    <p id="tauxEpargne"></p>
    <p id="recoEpargne"></p>
    <p id="projectionEpargne"></p>
  </div>

  <!-- 🎯 SIMULATEUR -->
  <div class="epargne-box">
    <p>🎯 Teste ton objectif d’épargne :</p>

    <input type="range" id="customEpargne" min="0" max="50" value="10">

    <p id="customResult"></p>
  </div>

  <button onclick="partager()">📲 Partager mon résultat</button>

</div>

    <!-- DÉPENSES -->
    <button class="toggle" onclick="toggleDepenses()">➕ Ajouter mes dépenses</button>

    <div id="depensesBloc" class="hidden">

      <div class="input-group">
        <span>🏠 Loyer</span>
        <input id="loyer" type="number">
      </div>

      <div class="input-group">
        <span>🛒 Courses</span>
        <input id="courses" type="number">
      </div>

      <div class="input-group">
        <span>🚗 Transport</span>
        <input id="transport" type="number">
      </div>

      <div class="input-group">
        <span>💡 Factures</span>
        <input id="factures" type="number">
      </div>

      <div class="input-group">
        <span>🎮 Loisirs</span>
        <input id="loisirs" type="number">
      </div>

      <div class="input-group">
        <span>🧾 Autres</span>
        <input id="autres" type="number">
      </div>

    </div>

    <p class="disclaimer">
      ⚠️ Estimation basée sur des moyennes (INSEE simplifiée)
    </p>

  </div>

</div>

<script defer src="script.js"></script>

</body>
</html>
