<!DOCTYPE html> 
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon vrai salaire</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>💰 Combien te reste-t-il vraiment ?</h1>
  <p class="subtitle">Après charges, impôts et dépenses</p>

  <input type="number" id="brut" placeholder="Salaire brut">

  <select id="statut">
    <option value="0.22">Salarié</option>
    <option value="0.25">Cadre</option>
    <option value="0.22">Micro-entrepreneur</option>
    <option value="0.45">Société</option>
  </select>

  <div class="input-group">
    <span>🏛️</span>
    <input type="number" id="impot" placeholder="Impôt (%)">
  </div>

  <button onclick="calc()">Calculer</button>

  <div class="card">

    <h2>Résultat</h2>

    <!-- 💰 RESTE (PRINCIPAL) -->
    <div class="reste-main">

      <p class="reste-title">💰 Il te reste</p>
      <h1 id="resteAffiche">0€</h1>

      <!-- ✅ SEULE VRAIE JAUGE -->
      <div class="bar-container">
        <div id="barDepenses"></div>
        <div id="barReste"></div>
      </div>

      <p class="legend">🔴 Dépenses | 🟢 Reste</p>

      <div id="analyse"></div>

    </div>

    <!-- 🔘 BOUTON -->
    <button onclick="toggleEpargne()" class="btn-epargne">
      💡 Optimiser mon argent
    </button>

    <!-- 💸 ÉPARGNE (SÉPARÉE) -->
    <div id="blocEpargne" class="epargne hidden">

      <!-- petite jauge -->
      <div class="epargne-jauge">
        <div id="jaugeFill"></div>
      </div>

      <p id="jaugeLabel"></p>

      <div class="epargne-box">
        <p id="tauxEpargne"></p>
        <p id="recoEpargne"></p>
      </div>

      <button onclick="partager()">📲 Partager mon résultat</button>

    </div>

    <!-- dépenses -->
    <button class="toggle" onclick="toggleDepenses()">➕ Ajouter mes dépenses</button>

    <div id="depensesBloc" class="hidden">

      <h3>📉 Dépenses</h3>

      <div class="input-group">
        <span>🏠 Loyer</span>
        <input type="number" id="loyer">
        <span class="euro">€</span>
      </div>

      <div class="input-group">
        <span>🛒 Courses</span>
        <input type="number" id="courses">
        <span class="euro">€</span>
      </div>

      <div class="input-group">
        <span>🚗 Transport</span>
        <input type="number" id="transport">
        <span class="euro">€</span>
      </div>

      <div class="input-group">
        <span>💡 Factures</span>
        <input type="number" id="factures">
        <span class="euro">€</span>
      </div>

      <div class="input-group">
        <span>🎮 Loisirs</span>
        <input type="number" id="loisirs">
        <span class="euro">€</span>
      </div>

      <div class="input-group">
        <span>🧾 Autres</span>
        <input type="number" id="autres">
        <span class="euro">€</span>
      </div>

    </div>

    <p class="disclaimer">⚠️ Estimation basée sur des moyennes</p>

  </div>

</div>

<script src="script.js"></script>
<script defer src="/_vercel/insights/script.js"></script>

</body>
</html>
